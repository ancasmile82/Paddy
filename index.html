<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
body {
  margin:0;
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  transition: background 0.5s;
  font-family: Arial, sans-serif;
}
h1 {
  color:white;
  font-size:12vw;
  margin:0;
}
</style>
</head>
<body>

<h1 id="text"></h1>

<script>
async function updateContent(){
  try{
    let r = await fetch("color.txt?"+Date.now());
    let data = await r.text();
    let parts = data.split("|");
    
    document.body.style.background = parts[0].trim();
    
    if(parts[1]){
      document.getElementById("text").innerText = parts[1].trim();
    } else {
      document.getElementById("text").innerText = "";
    }
    
  } catch(e){}
}

setInterval(updateContent,1000);
updateContent();
</script>

</body>
</html>
</script>

</body>
</html>
