<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
body { margin:0; height:100vh; transition: background 0.3s; }
</style>
</head>
<body>

<script>
async function updateColor(){
  try{
    let r = await fetch("color.txt?"+Date.now());
    let c = await r.text();
    document.body.style.background = c.trim();
  } catch(e){}
}

setInterval(updateColor,1000);
updateColor();
</script>

</body>
</html>
