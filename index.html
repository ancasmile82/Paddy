<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  body {
    margin: 0;
    height: 100vh;
    transition: background 0.5s;
  }
</style>
</head>
<body>

<script>
async function updateColor(){
  try{
    let response = await fetch('color.txt?'+Date.now());
    let color = await response.text();
    document.body.style.background = color.trim();
  } catch(e){
    console.error(e);
  }
}

setInterval(updateColor, 500);
updateColor();
</script>

</body>
</html>
